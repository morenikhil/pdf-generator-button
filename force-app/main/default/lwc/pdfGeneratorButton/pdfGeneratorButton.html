<template>
    <lightning-card title="PDF Generator" icon-name="doctype:pdf">
        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                variant="border-filled"
                alternative-text="Refresh PDF List"
                title="Refresh"
                onclick={handleRefresh}
                disabled={isLoading}
            ></lightning-button-icon>
        </div>

        <div class="slds-card__body slds-card__body_inner">

            <!-- Generate Button Area -->
            <div class="slds-grid slds-grid_vertical-align-center slds-m-bottom_medium">
                <div class="slds-col">
                    <lightning-button
                        variant="brand"
                        label={buttonLabel}
                        title="Generate and save PDF for this record"
                        icon-name="utility:pdf_ext"
                        icon-position="left"
                        onclick={handleGeneratePdf}
                        disabled={isDisabled}
                        class="generate-btn"
                    ></lightning-button>
                </div>
                <template if:true={isLoading}>
                    <div class="slds-col slds-m-left_medium">
                        <lightning-spinner
                            alternative-text="Generating PDF..."
                            size="small"
                        ></lightning-spinner>
                    </div>
                    <div class="slds-col slds-m-left_large">
                        <span class="slds-text-color_weak slds-text-body_small">
                            Generating PDF, please wait&hellip;
                        </span>
                    </div>
                </template>
            </div>

            <!-- Previously Generated PDFs -->
            <template if:true={hasPdfs}>
                <div class="slds-section slds-is-open">
                    <h3 class="slds-section__title slds-theme_shade">
                        <span class="slds-truncate slds-p-horizontal_small" title="Generated PDFs">
                            Generated PDFs
                        </span>
                    </h3>
                    <div class="slds-section__content">
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_striped" role="grid">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col"><div class="slds-truncate" title="File Name">File Name</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Size">Size</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Created">Created</div></th>
                                    <th scope="col"><div class="slds-truncate" title="Action">Action</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={pdfList} for:item="pdf">
                                    <tr key={pdf.Id} class="slds-hint-parent">
                                        <td data-label="File Name">
                                            <div class="slds-truncate" title={pdf.Title}>
                                                <lightning-icon
                                                    icon-name="doctype:pdf"
                                                    size="x-small"
                                                    class="slds-m-right_x-small"
                                                ></lightning-icon>
                                                {pdf.Title}
                                            </div>
                                        </td>
                                        <td data-label="Size">
                                            <div class="slds-truncate">{pdf.formattedSize}</div>
                                        </td>
                                        <td data-label="Created">
                                            <div class="slds-truncate">
                                                <lightning-formatted-date-time
                                                    value={pdf.CreatedDate}
                                                    year="numeric"
                                                    month="short"
                                                    day="2-digit"
                                                    hour="2-digit"
                                                    minute="2-digit"
                                                ></lightning-formatted-date-time>
                                            </div>
                                        </td>
                                        <td data-label="Action">
                                            <lightning-button-icon
                                                icon-name="utility:download"
                                                variant="border-filled"
                                                alternative-text="Download PDF"
                                                title="Download"
                                                data-id={pdf.Id}
                                                data-doc-id={pdf.ContentDocumentId}
                                                onclick={handleDownload}
                                                size="small"
                                            ></lightning-button-icon>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <template if:true={hasNoPdfs}>
                <div class="slds-illustration slds-illustration_small slds-m-top_medium">
                    <div class="slds-text-longform">
                        <p class="slds-text-body_regular slds-text-align_center slds-text-color_weak">
                            No PDFs generated yet. Click the button above to create one.
                        </p>
                    </div>
                </div>
            </template>

        </div>
    </lightning-card>
</template>
